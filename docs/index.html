<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' data:; base-uri 'self'; frame-ancestors 'none'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Custard Calendar — Today's Flavor of the Day</title>
  <meta name="description" content="Today's Flavor of the Day and this week's confirmed schedule for frozen custard shops.">
  <meta property="og:title" content="Custard Forecast — Today's Flavor of the Day">
  <meta property="og:description" content="Today's Flavor of the Day and confirmed schedule for frozen custard shops near you.">
  <meta property="og:url" content="https://custard.chriskaschner.com/">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://custard.chriskaschner.com/og/page/forecast.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8D%A6%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005696">
  <link rel="stylesheet" href="style.css">
  <!-- Cloudflare Web Analytics --><script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "c050ff4e79d54b2abbb60587137d0bb2"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
  <div id="shared-nav" data-page="index"></div>

  <main>
    <!-- Empty state: no store selected -->
    <section id="empty-state">
      <div class="hero-empty">
        <p class="hero-empty-heading">Pick your Culver's to see today's flavor.</p>
        <button class="btn-primary" id="find-store-btn">Find your store</button>
      </div>
      <div id="near-me-section" class="near-me-section" hidden>
        <p class="near-me-label">Near you</p>
        <div id="near-me-cards" class="near-me-cards"></div>
      </div>
    </section>

    <!-- Loading skeleton -->
    <section id="today-loading" hidden>
      <div class="card today-card today-card-skeleton">
        <div class="today-flavor-body">
          <div class="skeleton-cone"></div>
          <div class="skeleton-text">
            <div class="skeleton-line skeleton-long"></div>
            <div class="skeleton-line skeleton-medium"></div>
            <div class="skeleton-line skeleton-short"></div>
            <div class="skeleton-line skeleton-short"></div>
          </div>
        </div>
      </div>
    </section>

    <!-- Error state -->
    <section id="error-state" hidden>
      <div class="card card--danger error-card">
        <p id="error-message">Something went wrong loading the flavor data.</p>
        <button class="btn-primary btn--danger btn--sm" id="retry-btn">Try again</button>
      </div>
    </section>

    <!-- Today's flavor hero card -->
    <section id="today-section" hidden>
      <div class="card card--hero today-card" id="today-card">
        <div class="today-flavor-body">
          <div class="today-flavor-cone cone-lg" id="today-cone" aria-hidden="true"></div>
          <div class="today-flavor-content">
            <div class="today-flavor-name" id="today-flavor"></div>
            <div class="today-flavor-desc" id="today-desc"></div>
            <div class="today-rarity" id="today-rarity" hidden></div>
          </div>
        </div>
        <div class="today-ctas" id="today-ctas"></div>
        <div class="today-meta" id="today-meta"></div>
      </div>
    </section>

    <!-- Week ahead (collapsed by default) -->
    <details id="week-section" hidden>
      <summary><h2 class="d-inline">Week Ahead</h2></summary>
      <div class="week-strip" id="week-strip"></div>
    </details>

    <!-- Below-fold CTA -->
    <section id="updates-cta" class="below-fold-cta" hidden>
      <p>Get daily flavor alerts — <a href="updates.html" class="cta-link-inline" id="updates-cta-link">set it up</a></p>
    </section>

  </main>

  <footer>
    <p class="footer-disclaimer">Not affiliated with any restaurant. Flavor data sourced from restaurant websites.</p>
    <div class="page-share-mount" id="page-share"></div>
  </footer>

  <script src="planner-shared.js"></script>
  <script src="planner-data.js"></script>
  <script src="planner-domain.js"></script>
  <script src="planner-ui.js"></script>
  <script src="shared-nav.js"></script>
  <script>CustardPlanner.initShareButton('page-share');</script>
  <script>var WORKER_BASE = CustardPlanner.WORKER_BASE;</script>
  <script src="cone-renderer.js"></script>
  <script src="today-page.js"></script>
</body>
</html>
